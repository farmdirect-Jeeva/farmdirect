<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FarmDirect — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Mukta',sans-serif;background:#0d1f0d;min-height:100vh;display:flex;flex-direction:column;}
  .header{background:linear-gradient(135deg,#1a4a2e,#0d2e1a);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden;}
  .logo{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:white;margin-bottom:6px;}
  .logo span{color:#f5c842;}
  .tagline{color:rgba(255,255,255,0.6);font-size:0.88rem;}
  .card{background:white;border-radius:28px 28px 0 0;padding:32px 24px 40px;flex:1;margin-top:-20px;}
  .firebase-badge{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:16px;padding:8px;background:#e8f5ed;border-radius:10px;}
  .fb-dot{width:8px;height:8px;border-radius:50%;background:#aaa;}
  .fb-dot.live{background:#4caf72;animation:pulse 1.5s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .fb-text{font-size:0.75rem;color:#2d7a4f;font-weight:700;}
  .card-title{font-weight:800;font-size:1.3rem;color:#1a2e1a;margin-bottom:6px;}
  .card-sub{font-size:0.85rem;color:#7a9a7a;margin-bottom:20px;}
  .role-tabs{display:flex;background:#e8f5ed;border-radius:14px;padding:4px;margin-bottom:20px;}
  .role-tab{flex:1;padding:10px;border-radius:10px;text-align:center;cursor:pointer;font-weight:700;font-size:0.88rem;color:#3d5a3d;transition:all 0.2s;border:none;background:transparent;font-family:'Mukta',sans-serif;}
  .role-tab.active{background:white;color:#1a4a2e;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  .alert{padding:12px 16px;border-radius:12px;margin-bottom:14px;font-size:0.88rem;font-weight:600;display:none;}
  .alert.show{display:block;}
  .alert.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2;}
  .alert.success{background:#e8f5ed;color:#1a4a2e;border:1px solid #c8e6c9;}
  .form-group{margin-bottom:16px;}
  label{display:block;font-weight:700;font-size:0.85rem;color:#1a2e1a;margin-bottom:6px;}
  input{width:100%;padding:13px 16px;border:2px solid #d4e8d4;border-radius:14px;font-family:'Mukta',sans-serif;font-size:0.95rem;color:#1a2e1a;outline:none;transition:all 0.2s;}
  input:focus{border-color:#2d7a4f;box-shadow:0 0 0 3px rgba(45,122,79,0.1);}
  input::placeholder{color:#aaa;}
  .pass-wrap{position:relative;}
  .pass-wrap input{padding-right:50px;}
  .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;}
  .forgot{text-align:right;margin-top:6px;}
  .forgot a{font-size:0.8rem;color:#2d7a4f;font-weight:700;text-decoration:none;cursor:pointer;}
  .btn-login{width:100%;padding:15px;margin-top:8px;background:linear-gradient(135deg,#2d7a4f,#1a4a2e);color:white;border:none;border-radius:14px;font-family:'Mukta',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(45,122,79,0.35);}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
  .spinner{display:none;width:24px;height:24px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#d4e8d4;}
  .divider span{font-size:0.8rem;color:#aaa;font-weight:600;}
  .google-btn{width:100%;padding:13px;border-radius:14px;border:2px solid #d4e8d4;background:white;font-family:'Mukta',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-bottom:12px;}
  .google-btn:hover{border-color:#2d7a4f;background:#e8f5ed;}
  .register-link{text-align:center;margin-top:16px;font-size:0.88rem;color:#7a9a7a;}
  .register-link a{color:#2d7a4f;font-weight:800;text-decoration:none;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌾 Farm<span>Direct</span></div>
  <div class="tagline">Welcome back! Login to continue</div>
</div>

<div class="card">

  <div class="firebase-badge">
    <div class="fb-dot" id="fbDot"></div>
    <div class="fb-text" id="fbText">Connecting to Firebase...</div>
  </div>

  <div class="card-title">Login to FarmDirect 👋</div>
  <div class="card-sub">Real login powered by Firebase 🔥</div>

  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole(this,'farmer')">👨‍🌾 I'm a Farmer</button>
    <button class="role-tab" onclick="setRole(this,'buyer')">🛒 I'm a Buyer</button>
  </div>

  <div class="alert error" id="errorAlert"></div>
  <div class="alert success" id="successAlert"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="loginEmail" placeholder="Enter your email" onkeypress="if(event.key==='Enter')handleLogin()"/>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="pass-wrap">
      <input type="password" id="loginPass" placeholder="Enter your password" onkeypress="if(event.key==='Enter')handleLogin()"/>
      <button class="eye-btn" onclick="togglePass()">👁️</button>
    </div>
    <div class="forgot"><a onclick="forgotPassword()">Forgot Password?</a></div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <span id="loginBtnText">Login →</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="divider"><span>OR</span></div>

  <button class="google-btn" onclick="googleLogin()">
    <span style="font-size:1.2rem;">🔴</span> Continue with Google
  </button>

  <div class="register-link">
    New to FarmDirect? <a href="register.html">Create account →</a>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCumClHWGeEY8s8z0U8zsWIkSYlcPpfp-0",
    authDomain: "farmdirect-3af51.firebaseapp.com",
    projectId: "farmdirect-3af51",
    storageBucket: "farmdirect-3af51.firebasestorage.app",
    messagingSenderId: "1072511045991",
    appId: "1:1072511045991:web:faee00639e775f2f089fc2",
    measurementId: "G-2RV92TW52K"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // Connected!
  document.getElementById('fbDot').classList.add('live');
  document.getElementById('fbText').textContent = '🔥 Firebase Connected — Real Auth Active!';

  // Auto redirect if logged in
  onAuthStateChanged(auth, async user => {
    if (user) {
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        const role = userDoc.exists() ? userDoc.data().role : 'buyer';
        localStorage.setItem('farmdirect_role', role);
        localStorage.setItem('farmdirect_uid', user.uid);
        localStorage.setItem('farmdirect_name', user.displayName || userDoc.data()?.name || 'User');
        showSuccess('✅ Already logged in! Redirecting...');
        setTimeout(() => {
          window.location.href = role === 'farmer' ? 'farmer-dashboard.html' : 'buyer-dashboard.html';
        }, 1000);
      } catch(e) {}
    }
  });

  window.handleLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!email || !pass) { showError('⚠️ Please fill all fields!'); return; }
    if (!email.includes('@')) { showError('⚠️ Please enter a valid email!'); return; }
    setLoading(true);
    hideAlerts();
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      const user = result.user;
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        const role = userDoc.exists() ? userDoc.data().role : window._role;
        const name = userDoc.exists() ? userDoc.data().name : user.email;
        localStorage.setItem('farmdirect_role', role);
        localStorage.setItem('farmdirect_uid', user.uid);
        localStorage.setItem('farmdirect_name', name);
        showSuccess(`✅ Welcome back ${name}! Redirecting...`);
        setTimeout(() => {
          window.location.href = role === 'farmer' ? 'farmer-dashboard.html' : 'buyer-dashboard.html';
        }, 1500);
      } catch(e) {
        localStorage.setItem('farmdirect_role', window._role);
        localStorage.setItem('farmdirect_uid', user.uid);
        showSuccess('✅ Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = window._role === 'farmer' ? 'farmer-dashboard.html' : 'buyer-dashboard.html';
        }, 1500);
      }
    } catch(error) {
      setLoading(false);
      const msgs = {
        'auth/user-not-found': '❌ No account found! Please register first.',
        'auth/wrong-password': '❌ Wrong password! Please try again.',
        'auth/invalid-email': '❌ Invalid email address!',
        'auth/too-many-requests': '❌ Too many attempts! Try again later.',
        'auth/invalid-credential': '❌ Wrong email or password!'
      };
      showError(msgs[error.code] || '❌ Login failed: ' + error.message);
    }
  }

  window.googleLogin = async function() {
    setLoading(true);
    try {
      const result = await signInWithPopup(auth, googleProvider);
      localStorage.setItem('farmdirect_name', result.user.displayName || 'User');
      localStorage.setItem('farmdirect_uid', result.user.uid);
      localStorage.setItem('farmdirect_role', window._role);
      showSuccess(`✅ Welcome ${result.user.displayName}! Redirecting...`);
      setTimeout(() => window.location.href = window._role === 'farmer' ? 'farmer-dashboard.html' : 'buyer-dashboard.html', 1500);
    } catch(error) {
      setLoading(false);
      if (error.code !== 'auth/popup-closed-by-user') showError('Google login failed!');
    }
  }

  window.forgotPassword = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showError('⚠️ Enter your email first!'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('✅ Password reset email sent! Check your inbox.');
    } catch(e) { showError('Failed to send reset email!'); }
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    const txt = document.getElementById('loginBtnText');
    const spin = document.getElementById('spinner');
    btn.disabled = loading;
    txt.style.display = loading ? 'none' : 'inline';
    spin.style.display = loading ? 'block' : 'none';
  }

  function showError(msg) { const e = document.getElementById('errorAlert'); e.textContent = msg; e.classList.add('show'); document.getElementById('successAlert').classList.remove('show'); setLoading(false); }
  function showSuccess(msg) { const e = document.getElementById('successAlert'); e.textContent = msg; e.classList.add('show'); document.getElementById('errorAlert').classList.remove('show'); }
  function hideAlerts() { document.getElementById('errorAlert').classList.remove('show'); document.getElementById('successAlert').classList.remove('show'); }
</script>

<script>
  window._role = 'farmer';
  function setRole(btn, role) {
    document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    window._role = role;
  }
  function togglePass() {
    const i = document.getElementById('loginPass');
    const b = document.querySelector('.eye-btn');
    i.type = i.type === 'password' ? 'text' : 'password';
    b.textContent = i.type === 'password' ? '👁️' : '🙈';
  }
</script>
</body>
</html>
