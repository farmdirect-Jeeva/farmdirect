<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FarmDirect — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Mukta',sans-serif;background:#0d1f0d;min-height:100vh;display:flex;flex-direction:column;}

  /* HEADER */
  .header{
    background:linear-gradient(135deg,#1a4a2e,#0d2e1a);
    padding:48px 24px 40px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .header::before{content:'🌾';position:absolute;font-size:180px;opacity:0.05;top:-30px;right:-20px;}
  .logo{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:white;margin-bottom:6px;}
  .logo span{color:#f5c842;}
  .tagline{color:rgba(255,255,255,0.6);font-size:0.88rem;}

  /* CARD */
  .card{
    background:white;border-radius:28px 28px 0 0;
    padding:32px 24px 40px;flex:1;
    margin-top:-20px;
  }

  .card-title{font-weight:800;font-size:1.3rem;color:#1a2e1a;margin-bottom:6px;}
  .card-sub{font-size:0.85rem;color:#7a9a7a;margin-bottom:28px;}

  /* FORM */
  .form-group{margin-bottom:18px;}
  label{display:block;font-weight:700;font-size:0.85rem;color:#1a2e1a;margin-bottom:6px;}
  input{
    width:100%;padding:13px 16px;
    border:2px solid #d4e8d4;border-radius:14px;
    font-family:'Mukta',sans-serif;font-size:0.95rem;
    color:#1a2e1a;outline:none;transition:all 0.2s;
  }
  input:focus{border-color:#2d7a4f;box-shadow:0 0 0 3px rgba(45,122,79,0.1);}
  input::placeholder{color:#aaa;}

  /* PASSWORD WRAP */
  .pass-wrap{position:relative;}
  .pass-wrap input{padding-right:50px;}
  .eye-btn{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;font-size:1.1rem;cursor:pointer;
  }

  /* FORGOT */
  .forgot{text-align:right;margin-top:6px;}
  .forgot a{font-size:0.8rem;color:#2d7a4f;font-weight:700;text-decoration:none;}

  /* BUTTONS */
  .btn-login{
    width:100%;padding:15px;margin-top:8px;
    background:linear-gradient(135deg,#2d7a4f,#1a4a2e);
    color:white;border:none;border-radius:14px;
    font-family:'Mukta',sans-serif;font-size:1rem;font-weight:700;
    cursor:pointer;transition:all 0.2s;
    box-shadow:0 4px 16px rgba(45,122,79,0.35);
  }
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,122,79,0.4);}

  /* DIVIDER */
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#d4e8d4;}
  .divider span{font-size:0.8rem;color:#aaa;font-weight:600;}

  /* SOCIAL LOGIN */
  .social-btns{display:flex;gap:12px;}
  .social-btn{
    flex:1;padding:12px;border-radius:12px;
    border:2px solid #d4e8d4;background:white;
    font-family:'Mukta',sans-serif;font-weight:700;
    font-size:0.85rem;cursor:pointer;transition:all 0.2s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .social-btn:hover{border-color:#2d7a4f;background:#e8f5ed;}

  /* REGISTER LINK */
  .register-link{text-align:center;margin-top:24px;font-size:0.88rem;color:#7a9a7a;}
  .register-link a{color:#2d7a4f;font-weight:800;text-decoration:none;}

  /* ROLE SELECTOR */
  .role-tabs{display:flex;background:#e8f5ed;border-radius:14px;padding:4px;margin-bottom:24px;}
  .role-tab{
    flex:1;padding:10px;border-radius:10px;text-align:center;
    cursor:pointer;font-weight:700;font-size:0.88rem;
    color:#3d5a3d;transition:all 0.2s;border:none;background:transparent;
    font-family:'Mukta',sans-serif;
  }
  .role-tab.active{background:white;color:#1a4a2e;box-shadow:0 2px 8px rgba(0,0,0,0.1);}

  /* LOADING */
  .loading{display:none;text-align:center;padding:20px;}
  .spinner{width:40px;height:40px;border:4px solid #e8f5ed;border-top:4px solid #2d7a4f;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* SUCCESS */
  .success-msg{
    display:none;background:#e8f5ed;border:2px solid #4caf72;
    border-radius:14px;padding:16px;text-align:center;margin-top:16px;
  }
  .success-msg p{color:#1a4a2e;font-weight:700;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🌾 Farm<span>Direct</span></div>
  <div class="tagline">Welcome back! Login to continue</div>
</div>

<!-- CARD -->
<div class="card">
  <div class="card-title">Login to FarmDirect 👋</div>
  <div class="card-sub">Enter your details to continue</div>

  <!-- ROLE SELECTOR -->
  <div class="role-tabs">
    <button class="role-tab active" onclick="setRole(this,'farmer')">👨‍🌾 I'm a Farmer</button>
    <button class="role-tab" onclick="setRole(this,'buyer')">🛒 I'm a Buyer</button>
  </div>

  <!-- FORM -->
  <div class="form-group">
    <label>Mobile Number / Email</label>
    <input type="text" id="loginId" placeholder="Enter mobile or email"/>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="pass-wrap">
      <input type="password" id="loginPass" placeholder="Enter your password"/>
      <button class="eye-btn" onclick="togglePass('loginPass',this)">👁️</button>
    </div>
    <div class="forgot"><a href="forgot.html">Forgot Password?</a></div>
  </div>

  <button class="btn-login" onclick="handleLogin()">Login →</button>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:#2d7a4f;font-weight:700;">Logging you in...</p>
  </div>

  <!-- SUCCESS -->
  <div class="success-msg" id="successMsg">
    <p>✅ Login Successful! Redirecting...</p>
  </div>

  <div class="divider"><span>OR</span></div>

  <div class="social-btns">
    <button class="social-btn" onclick="googleLogin()">
      <span>🔴</span> Google
    </button>
    <button class="social-btn" onclick="alert('Phone OTP login coming soon!')">
      <span>📱</span> OTP Login
    </button>
  </div>

  <div class="register-link">
    New to FarmDirect? <a href="register.html">Register here →</a>
  </div>

</div>

<script>
  let currentRole = 'farmer';

  function setRole(btn, role) {
    document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = role;
    document.getElementById('loginId').placeholder = role === 'farmer' ? 'Enter mobile or email' : 'Enter mobile or email';
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁️'; }
  }

  function handleLogin() {
    const id = document.getElementById('loginId').value;
    const pass = document.getElementById('loginPass').value;
    if (!id || !pass) { alert('Please fill all fields!'); return; }
    document.getElementById('loading').style.display = 'block';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => {
        if (currentRole === 'farmer') window.location.href = 'farmdirect-signup.html';
        else window.location.href = 'farmdirect-browse.html';
      }, 1500);
    }, 2000);
  }

  function googleLogin() {
    alert('🔴 Google Login\n\nIn real app — Google OAuth will login instantly!\n\nComing in Phase 2 with Firebase! 🔥');
  }
</script>
</body>
</html>
